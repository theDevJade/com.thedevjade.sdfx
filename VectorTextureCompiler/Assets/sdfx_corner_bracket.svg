<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <!-- top-left corner bracket. transparent background.
       for other corners: flip horizontally (top-right), flip vertically (bottom-left),
       flip both (bottom-right) -->
  <g fill="none" stroke="#7ee8ff" stroke-width="2">
    <polyline points="6,42 6,6 42,6"/>
  </g>
  <g fill="none" stroke="#b18cff" stroke-width="1">
    <polyline points="16,52 16,16 52,16"/>
  </g>
  <rect x="6" y="6" width="6" height="6" fill="#7ee8ff"/>
</svg>
